name: Daily Sports Emails

on:
  schedule:
    # 8:00 AM ET (EDT = UTC-4, so 12:00 UTC)
    # During EST (UTC-5) this runs at 7am ET — adjust to 13:00 UTC in winter
    - cron: '0 12 * * *'
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  send-mlb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests firebase-admin

      - name: Send MLB email
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          AI_TOKEN: ${{ secrets.AI_TOKEN }}
        run: python scripts/send_mlb.py

  send-nhl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests firebase-admin

      - name: Send NHL email
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          AI_TOKEN: ${{ secrets.AI_TOKEN }}
        run: python scripts/send_nhl.py
